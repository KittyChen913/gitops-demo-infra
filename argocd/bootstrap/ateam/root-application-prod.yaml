# Prod Root Application（App of Apps）
#
# 用途：GitOps 入口點（生產環境）— 管理 gitops-demo-apps
#       倉庫中 argocd/applicationsets/gitops-demo-prod.yaml 定義的 ApplicationSet。
#
# 部署方式：
#   由 Terraform kustomization_resource.argocd_root_app 管理。
#
# 注意：
#   - 此 Application 必須在 ArgoCD 安裝完成後才能套用。

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-application-prod
  namespace: argocd
  # finalizer 確保刪除 Application 時，ArgoCD 會先清理所有 child resources
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: root-application-prod
    app.kubernetes.io/part-of: gitops-demo
    app.kubernetes.io/managed-by: argocd
  annotations:
    # 標記此為 GitOps 的根入口點（prod），避免誤刪
    gitops-demo/role: "bootstrap-root-prod"
spec:
  # ── 目標叢集 ────────────────────────────────────────────────────────────────
  # ApplicationSet 必須部署到 ArgoCD 所在的 management cluster（本地叢集），
  # 而非 worker cluster。ApplicationSet Controller 在 management cluster 上運行，
  # 並由 gitops-demo-prod.yaml 中的 generators/clusterDecisionResource 決定
  # 要將 Application 部署到哪些 worker cluster（如 lke-prod-ateam）。
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  # ── 來源倉庫 ────────────────────────────────────────────────────────────────
  source:
    repoURL: https://github.com/KittyChen913/gitops-demo-apps.git
    targetRevision: master
    path: argocd/applicationsets  # prod 環境的 ArgoCD ApplicationSet 定義
    directory:
      include: "gitops-demo-prod.yaml"  # 只套用 prod ApplicationSet，排除 dev

  # ── 同步策略 ────────────────────────────────────────────────────────────────
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # ── 健康檢查與比對設定 ───────────────────────────────────────────────────────
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /status

  # ── 專案歸屬 ────────────────────────────────────────────────────────────────
  project: default

  revisionHistoryLimit: 10
