# ArgoCD 自我管理 Application
#
# 用途：讓 ArgoCD 管理自己的安裝（self-managed / GitOps bootstrap）
#       首次由 Terraform bootstrap 安裝 ArgoCD 完成後，套用此檔。
#       此後 argocd/install/ 目錄的任何變更只需 push 到 Git，
#       ArgoCD 就會自動同步（包含 argocd-cm patch、resource limits 等）。
#
# 套用時機：由 Terraform kustomization_resource.argocd_self_app 管理。
#           內容異動、資源遭刪除或設定漂移時，Terraform plan 會偵測差異。

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  # finalizer 確保刪除此 Application 前先清理 child resources
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/part-of: gitops-demo
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  source:
    repoURL: https://github.com/KittyChen913/gitops-demo-infra.git
    targetRevision: master
    path: argocd/install    # 指向含有 kustomization.yaml 的目錄

  # Terraform kbst provider 會將前一版 manifest 儲存在這些 annotations。
  # Argo CD 接手相同資源的 reconciliation 時必須保留這些內容。
  ignoreDifferences:
    - group: "*"
      kind: "*"
      jsonPointers:
        - /metadata/annotations/kubectl.kubernetes.io~1last-applied-configuration
        - /metadata/annotations/kustomization.kubestack.com~1last-applied-config-gzip

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # ArgoCD 自身 manifest 較大，建議 server-side apply
      - ClientSideApplyMigration=false
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
