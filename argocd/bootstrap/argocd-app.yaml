# ArgoCD Self-Managed Application
#
# 用途：讓 ArgoCD 管理自己的安裝（self-managed / GitOps bootstrap）
#       首次由 Terraform bootstrap 安裝 ArgoCD 完成後，套用此檔。
#       此後 argocd/install/ 目錄的任何變更只需 push 到 Git，
#       ArgoCD 就會自動同步（包含 argocd-cm patch、resource limits 等）。
#
# 套用時機：由 Terraform null_resource.argocd_self_app 自動執行（terraform apply 後自動觸發）。
#           argocd-app.yaml 內容異動時，Terraform triggers 會重新執行 kubectl apply。

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  # finalizer 確保刪除此 Application 前先清理 child resources
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/part-of: gitops-demo
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  source:
    repoURL: https://github.com/KittyChen913/gitops-demo-infra.git
    targetRevision: master
    path: argocd/install    # 指向含有 kustomization.yaml 的目錄

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # ArgoCD 自身 manifest 較大，建議 server-side apply
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
