apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

# ── 上游官方 manifest（固定版本，避免 stable 浮動指針）──────────────────────
resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.9/manifests/install.yaml

# ── 公司客製化 patches ────────────────────────────────────────────────────────
# 使用明確 target 選擇器，避免 Kustomize 在遠端 manifest 中找不到對應資源
patches:
  - path: patches/argocd-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
  - path: patches/argocd-server.yaml
    target:
      kind: Deployment
      name: argocd-server
