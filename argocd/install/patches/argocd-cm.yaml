apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  # ArgoCD Server 對外 URL（SSO callback、通知連結、UI breadcrumb 用）
  # 請替換為實際 ingress 域名
  url: https://argocd.example.com

  # 資源追蹤方式：annotation 模式較不易與既有 label selector 衝突
  application.resourceTrackingMethod: annotation

  # 允許 ArgoCD 管理 argocd namespace 本身的資源（self-managed 必要設定）
  application.instanceLabelKey: argocd.argoproj.io/app-name
