name: "Load Environment Config"
description: "Loads validated Argo CD environment settings from the repository"

inputs:
  environment:
    description: "Target environment (dev | prod)"
    required: true

outputs:
  ssm_path_prefix:
    description: "SSM Parameter Store path prefix"
    value: ${{ steps.load.outputs.ssm_path_prefix }}
  mgmt_cluster_label:
    description: "Management cluster label"
    value: ${{ steps.load.outputs.mgmt_cluster_label }}
  worker_cluster_label:
    description: "Worker cluster label"
    value: ${{ steps.load.outputs.worker_cluster_label }}
  root_applications:
    description: "Root Application metadata as compact JSON"
    value: ${{ steps.load.outputs.root_applications }}

runs:
  using: "composite"
  steps:
    - name: "Load environment configuration"
      id: load
      shell: bash
      env:
        TARGET_ENVIRONMENT: ${{ inputs.environment }}
      run: |
        case "${TARGET_ENVIRONMENT}" in
          dev|prod) ;;
          *)
            echo "::error::Unsupported environment: ${TARGET_ENVIRONMENT}"
            exit 1
            ;;
        esac

        CONFIG_FILE="terraform/argocd/environments/${TARGET_ENVIRONMENT}.json"
        CONFIG_PATH="${GITHUB_WORKSPACE}/${CONFIG_FILE}"

        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq is required to load environment configuration"
          exit 1
        fi

        if [ ! -f "${CONFIG_PATH}" ]; then
          echo "::error::Environment configuration not found: ${CONFIG_FILE}"
          exit 1
        fi

        SSM_PATH_PREFIX="$(jq -er '.ssm_path_prefix' "${CONFIG_PATH}")"
        MGMT_CLUSTER_LABEL="$(jq -er '.mgmt_cluster_label' "${CONFIG_PATH}")"
        WORKER_CLUSTER_LABEL="$(jq -er '.worker_cluster_label' "${CONFIG_PATH}")"

        if ! jq -e '
          .root_applications
          | type == "object"
            and length > 0
            and all(.[];
              (.name | type == "string" and length > 0)
              and (.manifest | type == "string" and length > 0)
            )
        ' "${CONFIG_PATH}" >/dev/null; then
          echo "::error::Invalid root_applications configuration: ${CONFIG_FILE}"
          exit 1
        fi

        ROOT_APPLICATIONS="$(jq -cer '.root_applications' "${CONFIG_PATH}")"

        {
          echo "ssm_path_prefix=${SSM_PATH_PREFIX}"
          echo "mgmt_cluster_label=${MGMT_CLUSTER_LABEL}"
          echo "worker_cluster_label=${WORKER_CLUSTER_LABEL}"
          echo "root_applications=${ROOT_APPLICATIONS}"
        } >> "${GITHUB_OUTPUT}"
