# ──────────────────────────────────────────────────────────────────────────────
# Terraform Apply — Manual Override (Emergency Use)
# ──────────────────────────────────────────────────────────────────────────────
#
# ⚠️  此 workflow 為緊急手動入口，正常部署流程請使用：
#   - Dev  → terraform-apply-dev.yml  （push to master 自動觸發）
#   - Prod → terraform-apply-prod.yml （push tag v*.*.* 觸發）
#
# 此 workflow 僅保留 workflow_dispatch，不接受任何 push trigger。
# 用途：pipeline 緊急補跑、debug 特定環境
#
# 觸發方式：
#   workflow_dispatch（手動指定 env，prod 需額外確認字串）
#
# 流程（每個 environment 獨立）：
#   1. determine-env    ── 決定要 apply 哪個 environment
#   2. guard-prod       ── prod apply 必須通過確認字串驗證
#   3. bootstrap-backend ── 確認既有 S3 state bucket
#   4. staged apply      ── 安裝、自管 Application、ATeam Application
#   5. verify            ── 呼叫並等待 ArgoCD bootstrap 驗證
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  TRIGGER DESIGN（此檔案）                                                │
# │  ❌ NO push: branches   ← 禁用，防止與 dev/prod 專屬 workflow 衝突       │
# │  ❌ NO push: tags       ← 禁用，prod tag trigger 在 prod workflow       │
# │  ✅ workflow_dispatch   ← 僅允許手動觸發（緊急使用）                      │
# └─────────────────────────────────────────────────────────────────────────┘
#
# 關鍵安全設計：
#   - prod 使用 GitHub Environment 的 required reviewer protection
#   - prod workflow_dispatch 需輸入 "APPLY-PROD" 確認字串
#   - concurrency lock 防止同環境雙重 apply
#   - Argo CD bootstrap Applications 由 Terraform provider 直接管理
#   - AWS credentials 透過 OIDC（無 stored key）
# ──────────────────────────────────────────────────────────────────────────────

name: "🔧 Terraform Apply [manual override]"

on:
  # ── 僅允許手動觸發 ──────────────────────────────────────────────────────
  # ❌ 不設定 push trigger（防止與 terraform-apply-dev/prod.yml 重複觸發）
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, prod]
        default: dev
      confirm_prod:
        description: "For PROD only — type 'APPLY-PROD' to confirm"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: "tf-apply-${{ inputs.environment }}"
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: 決定 apply 目標 environment
  # ────────────────────────────────────────────────────────────────────────────
  determine-env:
    name: "Determine Target Environment"
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set-envs.outputs.environments }}
    steps:
      - name: "Validate OIDC prerequisites"
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "::error title=Missing Secret::AWS_ACCOUNT_ID repository secret is not configured"
            echo "See README.md → CI/CD Configuration"
            exit 1
          fi
          echo "AWS Account ID configured ✓"

      - name: "Resolve target environments"
        id: set-envs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ inputs.environment }}
        run: |
          # 此 workflow 僅允許 workflow_dispatch
          # push trigger 已移至：
          #   dev  → terraform-apply-dev.yml
          #   prod → terraform-apply-prod.yml
          if [ "${EVENT_NAME}" != "workflow_dispatch" ]; then
            echo "::error::This workflow only accepts workflow_dispatch. Use terraform-apply-dev.yml or terraform-apply-prod.yml for automated triggers."
            exit 1
          fi
          echo "environments=[\"${INPUT_ENV}\"]" >> "${GITHUB_OUTPUT}"
          echo "Manual dispatch — target: ${INPUT_ENV}"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Production 部署安全護欄
  # 只在目標為 prod 時執行，驗證確認字串
  # ────────────────────────────────────────────────────────────────────────────
  guard-prod:
    name: "Production Deployment Guard"
    needs: determine-env
    runs-on: ubuntu-latest
    if: contains(needs.determine-env.outputs.environments, '"prod"')
    steps:
      - name: "Validate production confirmation string"
        env:
          EVENT_NAME: ${{ github.event_name }}
          CONFIRM_PROD: ${{ inputs.confirm_prod }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "${EVENT_NAME}" != "workflow_dispatch" ]; then
            echo "::error::Production apply can only be triggered via workflow_dispatch"
            exit 1
          fi
          if [ "${CONFIRM_PROD}" != "APPLY-PROD" ]; then
            echo "::error::Production deployment requires confirm_prod='APPLY-PROD'"
            echo "::error::Received: '${CONFIRM_PROD}'"
            exit 1
          fi
          echo "✅ Production deployment confirmed by @${ACTOR}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ────────────────────────────────────────────────────────────────────────────
  # Jobs 3-6: Backend and staged Terraform apply
  # ────────────────────────────────────────────────────────────────────────────
  bootstrap-backend:
    name: "1. Verify S3 Backend [${{ matrix.environment }}]"
    needs: [determine-env, guard-prod]
    if: |
      always() &&
      needs.determine-env.result == 'success' &&
      (needs.guard-prod.result == 'success' || needs.guard-prod.result == 'skipped')
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.determine-env.outputs.environments) }}
      max-parallel: 1
      fail-fast: true
    uses: ./.github/workflows/_bootstrap-backend.yml
    with:
      environment: ${{ matrix.environment }}
    secrets: inherit

  install-argocd:
    name: "2. Install Argo CD [${{ matrix.environment }}]"
    needs: [determine-env, bootstrap-backend]
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.determine-env.outputs.environments) }}
      max-parallel: 1
      fail-fast: true
    uses: ./.github/workflows/_terraform-apply-stage.yml
    with:
      environment: ${{ matrix.environment }}
      stage: install
    secrets: inherit

  register-argocd-application:
    name: "3. Register Argo CD Application [${{ matrix.environment }}]"
    needs: [determine-env, install-argocd]
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.determine-env.outputs.environments) }}
      max-parallel: 1
      fail-fast: true
    uses: ./.github/workflows/_terraform-apply-stage.yml
    with:
      environment: ${{ matrix.environment }}
      stage: self-manage
    secrets: inherit

  register-ateam-application:
    name: "4. Register ATeam Application [${{ matrix.environment }}]"
    needs: [determine-env, register-argocd-application]
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.determine-env.outputs.environments) }}
      max-parallel: 1
      fail-fast: true
    uses: ./.github/workflows/_terraform-apply-stage.yml
    with:
      environment: ${{ matrix.environment }}
      stage: ateam
    secrets: inherit

  verify:
    name: "Verify ArgoCD [${{ matrix.environment }}]"
    needs: [determine-env, register-ateam-application]
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.determine-env.outputs.environments) }}
      max-parallel: 1
      fail-fast: true
    uses: ./.github/workflows/argo-bootstrap-verify.yml
    with:
      environment: ${{ matrix.environment }}
    secrets: inherit
