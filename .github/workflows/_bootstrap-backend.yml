# ──────────────────────────────────────────────────────────────────────────────
# _bootstrap-backend.yml — 可重用 Workflow：確認既有 S3 State Bucket
# ──────────────────────────────────────────────────────────────────────────────
#
# 由 terraform-apply-dev.yml 與 terraform-apply-prod.yml 在 apply 前呼叫。
#
# 功能：
#   - 確認既有 S3 state bucket 可由部署帳號存取
#   - Bucket 名稱從 terraform/argocd/<environment>/backend.tf 讀取
#
# 流程：
#   1. 透過 OIDC 設定 AWS credentials
#   2. 從環境專屬 backend HCL 讀取 bucket 名稱
#   3. 確認 S3 bucket 存在、可存取且由目前 AWS 帳號擁有
#   4. 每次執行都校正 versioning、encryption 與 public access block
#
# 冪等保護：
#   本 repository 使用既有 bucket 與專屬 state key，不建立 bucket。
#   驗證失敗時立即停止，避免將 ownership 或 IAM 問題誤判為 bucket 不存在。
# ──────────────────────────────────────────────────────────────────────────────

name: "_Bootstrap S3 Backend"

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment for OIDC credentials (dev | prod)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    name: "Bootstrap [${{ inputs.environment }}]"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: terraform/environments/bootstrap

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      # ── 驗證 OIDC 前提條件 ──────────────────────────────────────────────────
      - name: "Validate OIDC prerequisites"
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "::error title=Missing Secret::AWS_ACCOUNT_ID repository secret is not configured"
            echo "See README.md → CI/CD Configuration"
            exit 1
          fi
          echo "AWS Account ID configured ✓"

      # ── AWS OIDC 認證 ────────────────────────────────────────────────────────
      # Account ID 來自 Repository Secret
      - name: "Configure AWS Credentials (OIDC)"
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}

      # ── 從環境專屬 backend HCL 讀取 bucket 名稱 ───────────────────────────
      # 不在 workflow 中 hardcode bucket name。
      - name: "Read bucket name from backend config"
        id: read-bucket
        working-directory: ${{ github.workspace }}
        env:
          BACKEND_ENV: ${{ inputs.environment }}
        run: |
          case "${BACKEND_ENV}" in
            dev|prod) ;;
            *)
              echo "::error::Unsupported backend environment: ${BACKEND_ENV}"
              exit 1
              ;;
          esac

          BACKEND_CONFIG="terraform/argocd/${BACKEND_ENV}/backend.tf"
          if [ ! -f "${BACKEND_CONFIG}" ]; then
            echo "::error::Backend config not found: ${BACKEND_CONFIG}"
            exit 1
          fi

          BUCKET=$(grep 'bucket' "${BACKEND_CONFIG}" \
            | sed 's/.*=\s*"\(.*\)".*/\1/')
          if [ -z "${BUCKET}" ]; then
            echo "::error::Failed to parse bucket name from ${BACKEND_CONFIG}"
            exit 1
          fi
          echo "bucket=${BUCKET}" >> "${GITHUB_OUTPUT}"
          echo "State bucket: ${BUCKET}"

      # ── 確認既有 S3 bucket 可由目前帳號使用 ────────────────────────────────
      # HeadBucket 的 403/404 都可能代表 ownership 或 IAM 問題，因此不自動建立。
      - name: "Verify Existing Bucket Access"
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_STATE_BUCKET: ${{ steps.read-bucket.outputs.bucket }}
        run: |
          if ! HEAD_BUCKET_ERROR=$(aws s3api head-bucket \
            --bucket "${TF_STATE_BUCKET}" \
            --expected-bucket-owner "${AWS_ACCOUNT_ID}" 2>&1); then
            echo "::error title=Existing S3 backend is not accessible::Bucket ${TF_STATE_BUCKET} must already exist, be owned by AWS account ${AWS_ACCOUNT_ID}, and allow the OIDC role to call HeadBucket (s3:ListBucket)."
            echo "::error::${HEAD_BUCKET_ERROR}"
            exit 1
          fi

          echo "Existing state bucket ${TF_STATE_BUCKET} is accessible"

      # ── 校正既有 bucket 的必要安全設定 ─────────────────────────────────────
      # Bootstrap 使用 ephemeral local state，且不允許 terraform import。
      # 因此 bucket 建立後，透過 AWS API 冪等校正可變的 bucket-level controls。
      - name: "Reconcile Bucket Security Controls"
        env:
          TF_STATE_BUCKET: ${{ steps.read-bucket.outputs.bucket }}
        run: |
          aws s3api wait bucket-exists --bucket "${TF_STATE_BUCKET}"

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'

          echo "Reconciled versioning, encryption, and public access block for ${TF_STATE_BUCKET}"
