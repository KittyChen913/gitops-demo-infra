# ──────────────────────────────────────────────────────────────────────────────
# _bootstrap-backend.yml — 可重用 Workflow：確保 S3 State Bucket 存在
# ──────────────────────────────────────────────────────────────────────────────
#
# 由 terraform-apply-dev.yml 與 terraform-apply-prod.yml 在 apply 前呼叫。
#
# 功能：
#   - 使用 terraform/environments/bootstrap/ 冪等建立 S3 state bucket
#   - Bucket 名稱從 terraform/argocd/<environment>/backend.tf 讀取
#
# 流程：
#   1. Configure AWS via OIDC
#   2. 從環境專屬 backend HCL 讀取 bucket 名稱
#   3. 確認 S3 bucket 是否存在、可存取且由目前 AWS 帳號擁有
#   4. 只有明確不存在（404）時才執行 terraform init → terraform apply
#   5. 每次執行都校正 versioning、encryption 與 public access block
#
# 冪等保護：
#   bucket 存在時不重複建立，但仍會校正必要的安全設定。
#   不使用 GitHub Actions cache，也不需要 terraform import。
# ──────────────────────────────────────────────────────────────────────────────

name: "_Bootstrap S3 Backend"

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment for OIDC credentials (dev | prod)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    name: "Bootstrap [${{ inputs.environment }}]"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: terraform/environments/bootstrap

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      # ── 驗證 OIDC 前提條件 ──────────────────────────────────────────────────
      - name: "Validate OIDC prerequisites"
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "::error title=Missing Secret::AWS_ACCOUNT_ID repository secret is not configured"
            echo "See README.md → CI/CD Configuration"
            exit 1
          fi
          echo "AWS Account ID configured ✓"

      # ── AWS OIDC 認證 ────────────────────────────────────────────────────────
      # Account ID 來自 Repository Secret
      - name: "Configure AWS Credentials (OIDC)"
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}

      # ── 從環境專屬 backend HCL 讀取 bucket 名稱 ───────────────────────────
      # 不在 workflow 中 hardcode bucket name。
      - name: "Read bucket name from backend config"
        id: read-bucket
        working-directory: ${{ github.workspace }}
        env:
          BACKEND_ENV: ${{ inputs.environment }}
        run: |
          case "${BACKEND_ENV}" in
            dev|prod) ;;
            *)
              echo "::error::Unsupported backend environment: ${BACKEND_ENV}"
              exit 1
              ;;
          esac

          BACKEND_CONFIG="terraform/argocd/${BACKEND_ENV}/backend.tf"
          if [ ! -f "${BACKEND_CONFIG}" ]; then
            echo "::error::Backend config not found: ${BACKEND_CONFIG}"
            exit 1
          fi

          BUCKET=$(grep 'bucket' "${BACKEND_CONFIG}" \
            | sed 's/.*=\s*"\(.*\)".*/\1/')
          if [ -z "${BUCKET}" ]; then
            echo "::error::Failed to parse bucket name from ${BACKEND_CONFIG}"
            exit 1
          fi
          echo "bucket=${BUCKET}" >> "${GITHUB_OUTPUT}"
          echo "State bucket: ${BUCKET}"

      # ── 確認 S3 bucket 是否存在且可由目前帳號使用 ──────────────────────────
      # 只有明確的 404 才代表可建立；403 可能是權限不足或 bucket 屬於其他帳號。
      - name: "Check Bucket Exists"
        id: check-bucket
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_STATE_BUCKET: ${{ steps.read-bucket.outputs.bucket }}
        run: |
          if HEAD_BUCKET_ERROR=$(aws s3api head-bucket \
            --bucket "${TF_STATE_BUCKET}" \
            --expected-bucket-owner "${AWS_ACCOUNT_ID}" 2>&1); then
            echo "Bucket ${TF_STATE_BUCKET} already exists — skipping creation"
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          case "${HEAD_BUCKET_ERROR}" in
            *"(404)"*|*"Not Found"*)
              echo "Bucket ${TF_STATE_BUCKET} does not exist — will create"
              echo "exists=false" >> "${GITHUB_OUTPUT}"
              ;;
            *"(403)"*|*"Forbidden"*)
              echo "::error title=S3 bucket is not accessible::Bucket ${TF_STATE_BUCKET} either belongs to another AWS account or the OIDC role lacks s3:ListBucket access. S3 bucket names are globally unique; verify bucket ownership, the AWS_ACCOUNT_ID secret, IAM permissions, and the bucket policy."
              exit 1
              ;;
            *)
              echo "::error title=Unable to inspect S3 bucket::${HEAD_BUCKET_ERROR}"
              exit 1
              ;;
          esac

      # ── Setup Terraform ──────────────────────────────────────────────────────
      - name: "Setup Terraform"
        if: steps.check-bucket.outputs.exists == 'false'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.10"
          terraform_wrapper: true

      # ── terraform init（local backend，不帶 -backend-config）────────────────
      - name: "Terraform Init"
        if: steps.check-bucket.outputs.exists == 'false'
        run: terraform init -input=false
        env:
          TF_IN_AUTOMATION: "true"

      # ── terraform apply ──────────────────────────────────────────────────────
      - name: "Terraform Apply"
        if: steps.check-bucket.outputs.exists == 'false'
        env:
          TF_IN_AUTOMATION: "true"
          TF_STATE_BUCKET: ${{ steps.read-bucket.outputs.bucket }}
        run: |
          set -o pipefail
          terraform apply \
            -var="tf_state_bucket=${TF_STATE_BUCKET}" \
            -auto-approve \
            -input=false \
            -no-color \
            2>&1 | grep -v -iE "^\s*(token|secret|password)\s*="

      # ── 校正既有 bucket 的必要安全設定 ─────────────────────────────────────
      # Bootstrap 使用 ephemeral local state，且不允許 terraform import。
      # 因此 bucket 建立後，透過 AWS API 冪等校正可變的 bucket-level controls。
      - name: "Reconcile Bucket Security Controls"
        env:
          TF_STATE_BUCKET: ${{ steps.read-bucket.outputs.bucket }}
        run: |
          aws s3api wait bucket-exists --bucket "${TF_STATE_BUCKET}"

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration \
              'BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true'

          echo "Reconciled versioning, encryption, and public access block for ${TF_STATE_BUCKET}"
