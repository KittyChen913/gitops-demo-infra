# ──────────────────────────────────────────────────────────────────────────────
# Cluster Health Check — Scheduled + On-Demand
# ──────────────────────────────────────────────────────────────────────────────
#
# 觸發方式：
#   A. schedule：每日一次自動執行（UTC 00:00）
#   B. workflow_dispatch：手動觸發，可選 environment（dev / prod / all）
#
# 檢查項目：
#   1. K8s API server 連通性
#   2. Node readiness（NotReady nodes 告警）
#   3. System pods health（kube-system namespace）
#   4. ArgoCD pods status（argocd namespace）
#   5. ArgoCD applications sync/health status
#   6. Worker cluster registration consistency
#
# 失敗處理：
#   - scheduled run 失敗：自動開 GitHub Issue（避免重複建立）
#   - 失敗不因其他環境失敗而互相影響（fail-fast: false）
#
# 安全設計：
#   - kubeconfig 不寫入 GITHUB_WORKSPACE
#   - token/CA 在 log 中 mask
#   - job 結束後 shred 清除 kubeconfig
# ──────────────────────────────────────────────────────────────────────────────

name: "🏥 Cluster Health Check"

on:
  schedule:
    - cron: "0 0 * * *"           # 每日一次（UTC）
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, prod, all]
        default: all

permissions:
  contents: read
  id-token: write
  issues: write    # 自動建立 incident issue

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: 決定要檢查哪些 environments
  # ────────────────────────────────────────────────────────────────────────────
  determine-envs:
    name: "Determine Target Environments"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: "Set environment matrix"
        id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ inputs.environment }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${INPUT_ENV}" = "all" ]; then
              echo 'matrix={"environment":["dev","prod"]}' >> "${GITHUB_OUTPUT}"
            else
              echo "matrix={\"environment\":[\"${INPUT_ENV}\"]}" >> "${GITHUB_OUTPUT}"
            fi
          else
            # Scheduled: 同時檢查所有 environments
            echo 'matrix={"environment":["dev","prod"]}' >> "${GITHUB_OUTPUT}"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Health Check（每個 environment 獨立執行）
  # ────────────────────────────────────────────────────────────────────────────
  health-check:
    name: "Health Check [${{ matrix.environment }}]"
    needs: determine-envs
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.determine-envs.outputs.matrix) }}
      fail-fast: false   # 一個環境失敗不影響另一個

    environment: ${{ matrix.environment }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      # ── AWS OIDC 認證 ─────────────────────────────────────────────────────
      - name: "Configure AWS Credentials (OIDC)"
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ap-southeast-1

      # ── 安裝 kubectl ──────────────────────────────────────────────────────
      - name: "Install kubectl"
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.30.0"

      # ── 從 SSM 取得叢集憑證 ───────────────────────────────────────────────
      - name: "Fetch cluster credentials from SSM"
        id: fetch-creds
        run: |
          SSM_PREFIX="${{ vars.SSM_PREFIX }}"
          MGMT_LABEL="${{ vars.MGMT_CLUSTER }}"
          WORKER_LABEL="${{ vars.WORKER_CLUSTER }}"

          echo "MGMT_LABEL=${MGMT_LABEL}" >> "${GITHUB_ENV}"
          echo "WORKER_LABEL=${WORKER_LABEL}" >> "${GITHUB_ENV}"

          API_ENDPOINT="$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/${MGMT_LABEL}/api-endpoint" \
            --query "Parameter.Value" --output text)"

          CA_CERT="$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/${MGMT_LABEL}/ca-cert" \
            --query "Parameter.Value" --output text)"

          TOKEN="$(aws ssm get-parameter \
            --name "${SSM_PREFIX}/${MGMT_LABEL}/token" \
            --with-decryption \
            --query "Parameter.Value" --output text)"

          # Mask in logs
          echo "::add-mask::${TOKEN}"
          echo "::add-mask::${CA_CERT}"

          KUBECONFIG_FILE="$(mktemp /tmp/kubeconfig-XXXXXX)"
          chmod 600 "${KUBECONFIG_FILE}"

          cat > "${KUBECONFIG_FILE}" <<KUBECONFIG_EOF
          apiVersion: v1
          kind: Config
          clusters:
          - name: mgmt
            cluster:
              server: ${API_ENDPOINT}
              certificate-authority-data: ${CA_CERT}
          users:
          - name: mgmt
            user:
              token: ${TOKEN}
          contexts:
          - name: mgmt
            context:
              cluster: mgmt
              user: mgmt
          current-context: mgmt
          KUBECONFIG_EOF

          echo "KUBECONFIG=${KUBECONFIG_FILE}" >> "${GITHUB_ENV}"
          echo "KUBECONFIG_FILE=${KUBECONFIG_FILE}" >> "${GITHUB_ENV}"

      # ── 執行健康檢查腳本 ──────────────────────────────────────────────────
      - name: "Run cluster health checks"
        id: health-check
        env:
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          chmod +x scripts/cluster-health.sh
          scripts/cluster-health.sh \
            "${ENVIRONMENT}" \
            "${MGMT_LABEL}" \
            "${WORKER_LABEL}" \
            2>&1 | tee "${{ runner.temp }}/health-report-${ENVIRONMENT}.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "${GITHUB_OUTPUT}"

      # ── 上傳 health report artifact ───────────────────────────────────────
      - name: "Upload Health Report"
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "health-report-${{ matrix.environment }}-${{ github.run_id }}"
          path: "${{ runner.temp }}/health-report-${{ matrix.environment }}.txt"
          retention-days: 30

      # ── Scheduled 失敗時自動開 GitHub Issue ──────────────────────────────
      - name: "Create GitHub Issue on Failure (scheduled only)"
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = `${process.env.RUNNER_TEMP}/health-report-${{ matrix.environment }}.txt`;
            let report = '(report not available)';
            try { report = fs.readFileSync(reportPath, 'utf8'); } catch (_) {}

            const today = new Date().toISOString().split('T')[0];
            const labels = ['health-check-failure', '${{ matrix.environment }}', 'incident'];
            const title = `🚨 Cluster Health Failure — \`${{ matrix.environment }}\` — ${today}`;

            for (const name of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color: name === 'incident' ? 'd73a4a' : 'fbca04',
                  description: 'Managed by cluster-health-check workflow',
                });
              }
            }

            // Check for existing open issue with same labels to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['health-check-failure', '${{ matrix.environment }}'],
              state: 'open',
            });

            const body = [
              `## 🚨 Cluster Health Check Failure`,
              ``,
              `**Environment:** \`${{ matrix.environment }}\``,
              `**Run:** [View Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              `**Detected:** ${new Date().toISOString()}`,
              ``,
              `### Health Report`,
              ``,
              '```',
              report.slice(0, 60_000),
              '```',
            ].join('\n');

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            } else {
              // Append update to existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `### 🔁 Health Check Still Failing — ${new Date().toISOString()}\n\n${body}`,
              });
            }

      # ── 自動關閉 Issue（若本次成功）──────────────────────────────────────
      - name: "Auto-close health issue on recovery"
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['health-check-failure', '${{ matrix.environment }}'],
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Cluster health check passed for \`${{ matrix.environment }}\` — auto-closing issue.\n\nRun: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: "Cleanup sensitive files"
        if: always()
        run: |
          if [ -n "${KUBECONFIG_FILE}" ] && [ -f "${KUBECONFIG_FILE}" ]; then
            shred -u "${KUBECONFIG_FILE}" 2>/dev/null || rm -f "${KUBECONFIG_FILE}"
          fi

      # ── Summary ───────────────────────────────────────────────────────────
      - name: "Write Health Check Summary"
        if: always()
        run: |
          REPORT="${{ runner.temp }}/health-report-${{ matrix.environment }}.txt"
          {
            echo "## 🏥 Cluster Health Check — \`${{ matrix.environment }}\`"
            echo ""
            if [ -f "${REPORT}" ]; then
              echo '```'
              cat "${REPORT}"
              echo '```'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
