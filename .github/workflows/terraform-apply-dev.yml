# ──────────────────────────────────────────────────────────────────────────────
# Terraform Apply - dev 環境 Pipeline
# ──────────────────────────────────────────────────────────────────────────────
#
# ⚠️  此 workflow 僅用於 DEV 環境，與 prod 完全隔離。
#     Prod 環境請見 terraform-apply-prod.yml（以 tag 觸發）
#
# 觸發時機：
#   Push 至 master，且異動路徑命中基礎設施相關檔案
#   （docs/README/Markdown 等文件變更不觸發此 pipeline）
#
# 設計原則：
#   - 每次 commit 至 master 皆可自動觸發（高頻執行）
#   - 只 apply dev，不接觸 prod 任何資源
#   - paths allowlist（allowlist > denylist，明確比例外安全）
#     等效效果：排除 *.md、docs/、README.md 等純文件變更
#   - AWS credentials 透過 OIDC 取得（不儲存 key）
#   - GitHub Environment `dev` 可加 branch protection（僅限 master）
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  觸發設計                                                               │
# │  push: branches: [master]  ← dev 允許頻繁觸發                          │
# │  paths: allowlist        ← 只有基礎設施變更才觸發（排除 docs/md）       │
# │  workflow_dispatch       ← 手動補跑（僅限 dev）                        │
# └─────────────────────────────────────────────────────────────────────────┘
# ──────────────────────────────────────────────────────────────────────────────

name: "🟢 Terraform Apply [dev]"

on:
  push:
    branches:
      - master
    # ── Path Allowlist（等同 paths-ignore docs）────────────────────────────
    # 僅 dev root、bootstrap、共用 module、Argo CD manifest 與此 pipeline
    # 的直接依賴變更才觸發。Prod-only、文件與一般 workflow 變更不部署 dev。
    paths:
      - "terraform/argocd/dev/**"
      - "terraform/environments/bootstrap/**"
      - "terraform/modules/argocd/**"
      - "argocd/**"
      - ".github/workflows/terraform-apply-dev.yml"
      - ".github/workflows/workflow-quality.yml"
      - ".github/workflows/_bootstrap-backend.yml"
      - ".github/workflows/_terraform-apply-stage.yml"
      - ".github/actions/**"

  workflow_dispatch:
    inputs:
      reason:
        description: "觸發原因（選填，用於 audit log）"
        required: false
        default: "manual re-run"

# 最小化 token 權限
permissions:
  contents: read
  id-token: write

# 同一時間只允許一個 dev apply 執行（排隊，不取消）
concurrency:
  group: "tf-apply-dev"
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1：Workflow 與 Script 品質檢查
  # ────────────────────────────────────────────────────────────────────────────
  quality:
    name: "Workflow Quality"
    uses: ./.github/workflows/workflow-quality.yml

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2：Bootstrap S3 Backend（確保 state bucket 存在）
  # ────────────────────────────────────────────────────────────────────────────
  bootstrap-backend:
    name: "1. Verify S3 Backend [dev]"
    needs: quality
    uses: ./.github/workflows/_bootstrap-backend.yml
    with:
      environment: dev
    secrets: inherit

  # ────────────────────────────────────────────────────────────────────────────
  # Jobs 3-5：分階段執行 dev Terraform Apply
  # ────────────────────────────────────────────────────────────────────────────
  install-argocd:
    name: "2. Install Argo CD [dev]"
    needs: bootstrap-backend
    uses: ./.github/workflows/_terraform-apply-stage.yml
    with:
      environment: dev
      stage: install
    secrets: inherit

  register-argocd-application:
    name: "3. Register Argo CD Application [dev]"
    needs: install-argocd
    uses: ./.github/workflows/_terraform-apply-stage.yml
    with:
      environment: dev
      stage: self-manage
    secrets: inherit

  register-ateam-application:
    name: "4. Register ATeam Application [dev]"
    needs: register-argocd-application
    uses: ./.github/workflows/_terraform-apply-stage.yml
    with:
      environment: dev
      stage: ateam
    secrets: inherit

  verify:
    name: "Verify ArgoCD [dev]"
    needs: register-ateam-application
    uses: ./.github/workflows/argo-bootstrap-verify.yml
    with:
      environment: dev
    secrets: inherit
